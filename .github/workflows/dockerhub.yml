name: Build and publish Docker images

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: users
            context: ./services/users
            dockerfile: ./services/users/Dockerfile
            image: DOCKERHUB_USERNAME/bookit-users

          - name: appointments
            context: ./services/appointments
            dockerfile: ./services/appointments/Dockerfile
            image: DOCKERHUB_USERNAME/bookit-appointments

          - name: notifications
            context: ./services/notifications
            dockerfile: ./services/notifications/Dockerfile
            image: DOCKERHUB_USERNAME/bookit-notifications

          - name: mobile-gateway
            context: ./services/mobile-gateway
            dockerfile: ./services/mobile-gateway/Dockerfile
            image: DOCKERHUB_USERNAME/bookit-mobile-gateway

          - name: booking-mf
            context: ./microfrontends
            dockerfile: ./microfrontends/apps/booking-mf/Dockerfile
            image: DOCKERHUB_USERNAME/bookit-booking-mf
            build-args: |
              VITE_WEB_GATEWAY_API=http://localhost:8080/api/web

          - name: shell
            context: ./microfrontends
            dockerfile: ./microfrontends/apps/shell/Dockerfile
            image: DOCKERHUB_USERNAME/bookit-shell
            build-args: |
              VITE_BOOKING_REMOTE_URL=http://localhost:4175/assets/remoteEntry.js
              VITE_WEB_GATEWAY_API=http://localhost:8080/api/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: prep
        run: echo "image=${{ matrix.image }}" | sed "s/DOCKERHUB_USERNAME/${{ secrets.DOCKERHUB_USERNAME }}/" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
