services:
  users-db:
    image: postgres:16
    container_name: bookit-users-db
    environment:
      POSTGRES_USER: bookit
      POSTGRES_PASSWORD: bookit
      POSTGRES_DB: bookit_users
    ports:
      - '5433:5432'
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bookit -d bookit_users']
      interval: 5s
      timeout: 3s
      retries: 20

  appointments-db:
    image: postgres:16
    container_name: bookit-appointments-db
    environment:
      POSTGRES_USER: bookit
      POSTGRES_PASSWORD: bookit
      POSTGRES_DB: bookit_appointments
    ports:
      - '5434:5432'
    volumes:
      - appointments_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bookit -d bookit_appointments']
      interval: 5s
      timeout: 3s
      retries: 20

  users:
    build:
      context: ./services/users
      dockerfile: Dockerfile
    container_name: bookit-users
    environment:
      PORT: '3001'
      DATABASE_URL: 'postgres://bookit:bookit@users-db:5432/bookit_users'
      GOOGLE_CLIENT_ID: '${GOOGLE_CLIENT_ID}'
    ports:
      - '3001:3001'
    depends_on:
      users-db:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bookit-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'

  appointments:
    build:
      context: ./services/appointments
      dockerfile: Dockerfile
    container_name: bookit-appointments
    environment:
      PORT: '3002'
      DATABASE_URL: 'postgres://bookit:bookit@appointments-db:5432/bookit_appointments'
      NOTIFICATIONS_URL: 'http://notifications:3003'
      RABBITMQ_URL: 'amqp://rabbitmq:5672'
    ports:
      - '3002:3002'
    depends_on:
      appointments-db:
        condition: service_healthy

  notifications:
    build:
      context: ./services/notifications
      dockerfile: Dockerfile
    container_name: bookit-notifications
    environment:
      PORT: '3003'
      SMTP_HOST: '${SMTP_HOST}'
      SMTP_PORT: '${SMTP_PORT}'
      SMTP_USER: '${SMTP_USER}'
      SMTP_PASS: '${SMTP_PASS}'
      SMTP_FROM: '${SMTP_FROM}'
      RABBITMQ_URL: 'amqp://rabbitmq:5672'
    ports:
      - '3003:3003'

  web-gateway:
    image: nginx:alpine
    container_name: bookit-web-gateway
    volumes:
      - ./services/web-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '8080:8080'
    depends_on:
      - users
      - appointments

  mobile-gateway:
    build:
      context: ./services/mobile-gateway
      dockerfile: Dockerfile
    container_name: bookit-mobile-gateway
    environment:
      USERS_URL: 'http://users:3001'
      APPOINTMENTS_URL: 'http://appointments:3002'
    ports:
      - '8081:8081'
    depends_on:
      - users
      - appointments

  booking-mf:
    build:
      context: ./microfrontends
      dockerfile: apps/booking-mf/Dockerfile
      args:
        VITE_WEB_GATEWAY_API: 'http://localhost:8080/api/web'
    container_name: bookit-booking-mf
    ports:
      - '4175:80'

  shell:
    build:
      context: ./microfrontends
      dockerfile: apps/shell/Dockerfile
      args:
        VITE_BOOKING_REMOTE_URL: 'http://localhost:4175/assets/remoteEntry.js'
        VITE_WEB_GATEWAY_API: 'http://localhost:8080/api/web'
    container_name: bookit-shell
    ports:
      - '4173:80'
    depends_on:
      - booking-mf

volumes:
  users_db_data:
  appointments_db_data:
